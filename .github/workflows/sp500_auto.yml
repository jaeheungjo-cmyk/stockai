name: S&P500 순위 자동 수집

on:
  schedule:
    - cron: '0 22 */3 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-sp500:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: pip install requests pandas openpyxl

      - name: S&P500 데이터 수집 및 분석
        run: python scripts/sp500_fetch.py

      - name: 변경사항 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "📊 S&P500 순위 자동 갱신 $(date +'%Y-%m-%d')"
          git push
