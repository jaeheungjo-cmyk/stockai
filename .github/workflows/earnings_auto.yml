name: 기업별 실적 자동 분석

on:
  schedule:
    # 매일 오전 8시 (KST) — S&P500 자동 수집(7시) 다음에 실행
    - cron: '0 23 * * *'
  workflow_dispatch:  # 수동 실행 버튼

permissions:
  contents: read

jobs:
  earnings-analysis:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: pip install requests

      - name: 관심필요 종목 실적 분석 및 시트 전송
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SHEETS_WEBHOOK_URL: ${{ secrets.SHEETS_WEBHOOK_URL }}
          SHEETS_WEBHOOK_TOKEN: ${{ secrets.SHEETS_WEBHOOK_TOKEN }}
        run: python scripts/earnings_fetch.py
